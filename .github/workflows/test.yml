name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    # Run unless it's a draft PR. Pushes to main & manual runs always pass this.
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.1.3

      # Cache Poetry venv so it loads faster on subsequent runs
      - name: Cache Poetry venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-poetry-${{ matrix.python-version }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-${{ matrix.python-version }}-

      - name: Install system-level dependencies for Manim
        run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config libcairo2-dev libpango1.0-dev ffmpeg

      - name: Install deps
        run: poetry install --no-interaction --extras animation

      - name: Sync poetry (safety check)
        run: poetry sync --extras animation

      - name: pytest
        run: poetry run pytest --runslow

      - name: Upload snapshot frames
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-frames-py${{ matrix.python-version }}
          path: /tmp/pytest-of-runner/pytest-*/test_stv_animation_video_snaps*/frames/
          if-no-files-found: ignore
