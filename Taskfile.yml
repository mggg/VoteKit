# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

vars:
  PYTHON_VERSION: "3.11"
  UV_STATE_DIR_UNIX: "{{.ROOT_DIR}}/.task-tools/uv"
  UV_STATE_DIR_WINDOWS: "{{.ROOT_DIR}}\\.task-tools\\uv"
  UV_INSTALL_DIR_UNIX: "{{.ROOT_DIR}}/.task-tools/uv/bin"
  UV_BIN_UNIX: "{{.UV_INSTALL_DIR_UNIX}}/uv"
  UV_CACHE_DIR_UNIX: "{{.UV_STATE_DIR_UNIX}}/cache"
  UV_PYTHON_INSTALL_DIR_UNIX: "{{.UV_STATE_DIR_UNIX}}/python"
  UV_INSTALL_DIR_WINDOWS: "{{.UV_STATE_DIR_WINDOWS}}\\bin"
  UV_BIN_WINDOWS: "{{.UV_INSTALL_DIR_WINDOWS}}\\uv.exe"
  UV_CACHE_DIR_WINDOWS: "{{.UV_STATE_DIR_WINDOWS}}\\cache"
  UV_PYTHON_INSTALL_DIR_WINDOWS: "{{.UV_STATE_DIR_WINDOWS}}\\python"

tasks:
  setup:
    desc: Set up the project environment for development
    silent: true
    cmds:
      - task: uv-{{OS}}
        vars:
          UV_ARGS: python install {{.PYTHON_VERSION}}
      - task: uv-{{OS}}
        vars:
          UV_ARGS: >-
            --managed-python sync --locked --all-groups --all-extras --python
            {{.PYTHON_VERSION}}
      - task: uv-{{OS}}
        vars:
          UV_ARGS: run pre-commit install

  format:
    desc: Format the codebase using Black and isort
    silent: true
    cmds:
      - task: uv-{{OS}}
        vars:
          UV_ARGS: run black src tests
      - task: uv-{{OS}}
        vars:
          UV_ARGS: run isort src tests

  lint:
    desc: Lint the codebase using Ruff
    silent: true
    cmds:
      - task: uv-{{OS}}
        vars:
          UV_ARGS: run ruff check src tests

  typecheck:
    desc: Run type checks using Ty
    silent: true
    cmds:
      - task: uv-{{OS}}
        vars:
          UV_ARGS: run ty check src tests

  test:
    desc: Run tests using pytest
    silent: true
    env:
      TERM: xterm
    cmds:
      - task: setup
      - task: uv-{{OS}}
        vars:
          UV_ARGS: run pytest tests

  clean:
    desc: Clean up build artifacts
    silent: true
    cmds:
      - task: clean-{{OS}}

  clean-windows:
    internal: true
    cmds:
      - cmd /c "if exist dist rmdir /s /q dist"
      - cmd /c "if exist build rmdir /s /q build"
      - cmd /c "if exist *.egg-info rmdir /s /q *.egg-info"
      - cmd /c "if exist .venv rmdir /s /q .venv"
      - cmd /c "if exist .pytest_cache rmdir /s /q .pytest_cache"
      - cmd /c "if exist .ruff_cache rmdir /s /q .ruff_cache"
      - cmd /c "if exist {{.UV_CACHE_DIR_WINDOWS}} rmdir /s /q {{.UV_CACHE_DIR_WINDOWS}}"
      - for /r . %d in (__pycache__) do @if exist "%d" rmdir /s /q "%d"

  clean-linux:
    internal: true
    cmds:
      - rm -rf dist build *.egg-info .venv .pytest_cache .ruff_cache "{{.UV_CACHE_DIR_UNIX}}"
      - find . -type d -name "__pycache__" -exec rm -rf {} +
      - find . -type f -name "*.pyc" -delete

  clean-darwin:
    internal: true
    cmds:
      - rm -rf dist build *.egg-info .venv .pytest_cache .ruff_cache "{{.UV_CACHE_DIR_UNIX}}"
      - find . -type d -name "__pycache__" -exec rm -rf {} +
      - find . -type f -name "*.pyc" -delete

  docs:
    desc: Build the documentation
    silent: true
    cmds:
      - task: sync-contributing-doc
      - task: uv-{{OS}}
        vars:
          UV_ARGS: run jupyter nbconvert --to rst notebooks/*.ipynb --output-dir docs/user/tutorial/
      - task: uv-{{OS}}
        vars:
          UV_ARGS: run sphinx-build -b dirhtml docs docs/_build

  sync-contributing-doc:
    desc: Sync the docs contributing page from CONTRIBUTING.md
    silent: true
    cmds:
      - task: uv-{{OS}}
        vars:
          UV_ARGS: run python docs/sync_contributing.py

  ensure-uv-linux:
    internal: true
    silent: true
    status:
      - test -x "{{.UV_BIN_UNIX}}"
    cmds:
      - |
        mkdir -p "{{.UV_INSTALL_DIR_UNIX}}"
        curl -LsSf https://astral.sh/uv/install.sh \
          | env UV_UNMANAGED_INSTALL="{{.UV_INSTALL_DIR_UNIX}}" sh

  ensure-uv-darwin:
    internal: true
    silent: true
    status:
      - test -x "{{.UV_BIN_UNIX}}"
    cmds:
      - |
        mkdir -p "{{.UV_INSTALL_DIR_UNIX}}"
        curl -LsSf https://astral.sh/uv/install.sh \
          | env UV_UNMANAGED_INSTALL="{{.UV_INSTALL_DIR_UNIX}}" sh

  ensure-uv-windows:
    internal: true
    silent: true
    status:
      - cmd /c if exist "{{.UV_BIN_WINDOWS}}" exit 0 else exit 1
    cmds:
      - >
        powershell -ExecutionPolicy ByPass -Command "$env:UV_UNMANAGED_INSTALL =
        '{{.UV_INSTALL_DIR_WINDOWS}}'; irm https://astral.sh/uv/install.ps1 | iex"

  uv-linux:
    internal: true
    silent: true
    cmds:
      - task: ensure-uv-linux
      - >
        env UV_CACHE_DIR="{{.UV_CACHE_DIR_UNIX}}"
        UV_PYTHON_INSTALL_DIR="{{.UV_PYTHON_INSTALL_DIR_UNIX}}"
        "{{.UV_BIN_UNIX}}" {{.UV_ARGS}}

  uv-darwin:
    internal: true
    silent: true
    cmds:
      - task: ensure-uv-darwin
      - >
        env UV_CACHE_DIR="{{.UV_CACHE_DIR_UNIX}}"
        UV_PYTHON_INSTALL_DIR="{{.UV_PYTHON_INSTALL_DIR_UNIX}}"
        "{{.UV_BIN_UNIX}}" {{.UV_ARGS}}

  uv-windows:
    internal: true
    silent: true
    cmds:
      - task: ensure-uv-windows
      - >
        cmd /c "set UV_CACHE_DIR={{.UV_CACHE_DIR_WINDOWS}}&& set
        UV_PYTHON_INSTALL_DIR={{.UV_PYTHON_INSTALL_DIR_WINDOWS}}&&
        {{.UV_BIN_WINDOWS}} {{.UV_ARGS}}"
