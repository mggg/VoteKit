repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.3.0
    hooks:
      - id: check-merge-conflict
      - id: debug-statements
  - repo: local
    hooks:
      - id: format-check
        name: format-check
        entry: sh -c 'command -v task >/dev/null 2>&1 && task format-check || go-task format-check'
        language: system
        pass_filenames: false
      - id: lint
        name: lint
        entry: sh -c 'command -v task >/dev/null 2>&1 && task lint || go-task lint'
        language: system
        pass_filenames: false
      - id: typecheck
        name: typecheck
        entry: sh -c 'command -v task >/dev/null 2>&1 && task typecheck || go-task typecheck'
        language: system
        pass_filenames: false
