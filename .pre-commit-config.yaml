repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.3.0
    hooks:
      - id: check-merge-conflict
      - id: debug-statements
  - repo: local
    hooks:
      - id: format-check
        name: format-check
        entry: sh -c 'uv run ruff check --select I --diff "$@" && uv run ruff format --check "$@"' --
        language: system
        types: [python]
        pass_filenames: true
      - id: lint
        name: lint
        entry: uv run ruff check
        language: system
        types: [python]
        pass_filenames: true
      - id: typecheck
        name: typecheck
        entry: sh -c 'command -v task >/dev/null 2>&1 && task typecheck || go-task typecheck'
        language: system
        types: [python]
        pass_filenames: false
